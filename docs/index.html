<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>实验室共享台账</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.75.0/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f5f7f8;color:#1f2933}button,input,select{font:inherit}button{cursor:pointer}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.box{width:min(460px,100%);background:#fff;border:1px solid #dce4e8;border-radius:8px;padding:28px;box-shadow:0 18px 45px rgba(25,48,55,.12)}h1{margin:0 0 6px;font-size:24px}h2{margin:0 0 14px;font-size:18px}p{margin:0 0 18px;color:#66737b}.field{display:grid;gap:6px;margin:12px 0;color:#46565f;font-size:14px}input,select{min-height:38px;border:1px solid #cfd8dd;border-radius:6px;padding:7px 10px;background:white}.primary{min-height:40px;border:0;border-radius:6px;padding:0 16px;background:#16735f;color:#fff;font-weight:650}.shell{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.side{background:#163238;color:#eef7f4;padding:20px 14px}.brand{font-size:20px;font-weight:750;margin-bottom:20px}.nav{display:grid;gap:6px}.nav button{height:40px;border:0;border-radius:6px;background:transparent;color:#dcebe7;text-align:left;padding:0 12px}.nav button.active,.nav button:hover{background:#24515a;color:#fff}.main{padding:24px;overflow:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.panel{background:#fff;border:1px solid #dce4e8;border-radius:8px;padding:16px;overflow:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px;align-items:end}.stack{display:grid;gap:12px;max-width:720px}.search{display:flex;gap:10px;margin-bottom:14px}.search input{width:100%}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:10px 12px;border-bottom:1px solid #e7ecef;text-align:left;font-size:14px;vertical-align:top}th{background:#f4f7f8;color:#4d5f68}.msg{padding:10px 12px;border-radius:6px;margin-bottom:12px;background:#eef7f4;border:1px solid #cfe4dd;color:#275d50}.err{background:#fff1f0;border-color:#ffd0cc;color:#a12a21}.actions button{margin-right:6px}.low{color:#b42318;font-weight:700}.muted{color:#66737b;font-size:13px}.loading{color:#66737b;padding:18px 4px}.row{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:820px){.shell{grid-template-columns:1fr}.side{position:sticky;top:0}.nav{grid-template-columns:repeat(3,1fr)}.main{padding:16px}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const SUPABASE_URL = "https://ashhlhsileqqaardojqu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_AGf_g4XQW1cFaKda2RnKDA_pxPERyLU";
    const roles = {owner:"实验室负责人", member:"实验室成员", readonly:"只读成员"};
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let session = null;
    let profile = null;
    let view = "home";
    let msg = "";
    let busy = false;
    let documentCategory = "仪器操作说明";
    const pageCache = {};
    const crudImportConfigs = {};

    function h(s){return String(s == null ? "" : s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
    function canWrite(){return profile && (profile.role === "owner" || profile.role === "member")}
    function isOwner(){return profile && profile.role === "owner"}
    async function run(promise, options={}){
      msg = "";
      const {data, error} = await promise;
      if(error){
        msg = error.message || "请求失败";
        if(options.renderOnError !== false) render();
        throw error;
      }
      return data;
    }
    async function quietRun(promise){
      const {data, error} = await promise;
      if(error) throw error;
      return data;
    }
    async function retryTask(task, attempts=3){
      let lastError = null;
      for(let i=0;i<attempts;i++){
        try{
          return await task();
        }catch(error){
          lastError = error;
          await new Promise(resolve => setTimeout(resolve, 600 * (i + 1)));
        }
      }
      throw lastError;
    }
    function errorText(error){
      return error && (error.message || error.error_description || error.details) || "网络请求失败，请稍后重试";
    }
    async function init(){
      const res = await client.auth.getSession();
      session = res.data.session;
      if(session) await loadProfile();
      render();
    }
    async function loadProfile(){
      const user = session.user;
      let data = await run(client.from("profiles").select("*").eq("id", user.id).maybeSingle()).catch(()=>null);
      if(!data){
        data = await run(client.from("profiles").insert({id:user.id, username:user.email, full_name:user.user_metadata.full_name || user.email, role:"member"}).select().single());
      }
      profile = data;
    }
    async function signIn(e){
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if(!email || !password){setLoginStatus("请填写邮箱和密码。", true); return}
      busy = true; setLoginStatus("正在登录...", false);
      let data, error;
      try{
        const res = await retryTask(() => client.auth.signInWithPassword({email, password}));
        data = res.data; error = res.error;
      }catch(err){error = err}
      busy = false;
      if(error){msg = errorText(error); render(); return}
      session = data.session;
      await loadProfile();
      render();
    }
    async function signUp(e){
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.getElementById("full_name").value.trim() || email;
      if(!email || !password){setLoginStatus("请填写邮箱和密码。", true); return}
      if(password.length < 6){setLoginStatus("密码至少需要 6 位。", true); return}
      busy = true; setLoginStatus("正在注册...", false);
      let data, error;
      try{
        const res = await retryTask(() => client.auth.signUp({email, password, options:{data:{full_name:fullName}}}));
        data = res.data; error = res.error;
      }catch(err){error = err}
      busy = false;
      if(error){msg = errorText(error); render(); return}
      msg = data.session ? "注册成功，已登录" : "注册成功，请按 Supabase 设置确认邮箱后再登录";
      session = data.session;
      if(session) await loadProfile();
      render();
    }
    async function logout(){await client.auth.signOut();session=null;profile=null;render()}
    function setLoginStatus(text, error){
      const el = document.getElementById("login_status");
      if(el){el.className = "msg " + (error ? "err" : ""); el.textContent = text; el.style.display = "block";}
      document.querySelectorAll("#login_buttons button").forEach(btn => btn.disabled = busy);
    }
    function setInlineStatus(id,text,error){
      const el=document.getElementById(id);
      if(el){el.className="msg "+(error?"err":"");el.textContent=text;el.style.display="block";}
    }
    function layout(content){
      const tabs=[["home","首页搜索"],["consumables","耗材库存"],["hazardous_reagents","危化品"],["reagents","普通化学试剂"],["equipment","设备登记"],["inbound","耗材入库"],["checkout","耗材领用"],["doc_instrument","仪器操作说明"],["doc_method","实验方法"],["doc_safety","安全规范"],["doc_other","其他资料"],["records","历史记录"]];
      if(isOwner()) tabs.push(["users","用户管理"]);
      const currentTab = tabs.find(t=>t[0]===view);
      return `<div class="shell"><aside class="side"><div class="brand">实验室共享台账</div><div class="nav">${tabs.map(t=>`<button class="${view===t[0]?"active":""}" onclick="navigate('${t[0]}')">${t[1]}</button>`).join("")}</div></aside><main class="main"><div class="top"><div><h1>${currentTab ? currentTab[1] : ""}</h1><p>${h(profile.full_name||profile.username)} · ${roles[profile.role]}</p></div><div><button class="primary" onclick="exportExcel()">导出 CSV</button> <button onclick="logout()">退出</button></div></div>${msg?`<div class="msg ${msg.includes("error")||msg.includes("失败")||msg.includes("错误")||msg.includes("permission")?"err":""}">${h(msg)}</div>`:""}${content}</main></div>`;
    }
    function navigate(nextView){
      view=nextView;
      msg="";
      const root=document.getElementById("root");
      if(root && session && profile){
        root.innerHTML=layout(`<div class="panel"><div class="loading">正在打开...</div></div>`);
      }
      setTimeout(render, 0);
    }
    async function render(){
      const root=document.getElementById("root");
      if(SUPABASE_ANON_KEY.includes("PASTE_")){
        root.innerHTML = `<div class="login"><div class="box"><h1>还需要配置 Supabase Key</h1><p>请把 Supabase 的 anon / publishable key 填到 docs/index.html 里的 SUPABASE_ANON_KEY。</p></div></div>`;
        return;
      }
      if(!session||!profile){
        root.innerHTML=`<div class="login"><form class="box" onsubmit="return false"><h1>实验室共享台账</h1><p>首次使用请注册；已有账号直接登录。</p><div id="login_status" class="msg ${msg.includes("成功")?"":"err"}" style="${msg?"":"display:none"}">${h(msg)}</div><label class="field">邮箱<input id="email" type="email" required></label><label class="field">姓名<input id="full_name"></label><label class="field">密码<input id="password" type="password" required></label><div class="row" id="login_buttons"><button type="button" class="primary" onclick="signIn(event)" ${busy?"disabled":""}>登录</button><button type="button" onclick="signUp(event)" ${busy?"disabled":""}>注册</button></div><p class="muted" style="margin-top:14px">负责人账号注册后，需要在 Supabase SQL Editor 里把该邮箱设为 owner。</p></form></div>`;return}
      if(view==="home") return home();
      if(view==="consumables") return crud("consumables","耗材",["name:名称","category:分类","specification:规格","unit:单位","quantity:库存","min_quantity:预警线","location:位置","supplier:供应商","remark:备注"],{name:"",category:"",specification:"",unit:"件",quantity:0,min_quantity:0,location:"",supplier:"",remark:""});
      if(view==="hazardous_reagents") return crud("hazardous_reagents","危化品",["chinese_name:中文名","formula:化学式","cas:CAS","quantity:数量","original_weight:原重","current_weight:现有重量"],{chinese_name:"",formula:"",cas:"",quantity:0,original_weight:0,current_weight:0});
      if(view==="reagents") return crud("reagents","普通化学试剂",["chinese_name:中文名","formula:化学式","cas:CAS","quantity:数量","original_weight:原重","current_weight:现有重量"],{chinese_name:"",formula:"",cas:"",quantity:0,original_weight:0,current_weight:0});
      if(view==="equipment") return crud("equipment","设备登记",["asset_no:资产编号","name:名称","model:型号","owner:负责人","status:状态","location:位置","purchase_date:购置日期","price:价格","remark:备注"],{asset_no:"",name:"",model:"",owner:"",status:"在用",location:"",purchase_date:"",price:0,remark:""});
      if(view==="inbound"||view==="checkout") return stock(view);
      if(view.startsWith("doc_")) return documents();
      if(view==="records") return records();
      if(view==="users") return users();
    }
    async function home(){
      document.getElementById("root").innerHTML=layout(`<div class="search"><input id="q" placeholder="搜索耗材、试剂、设备、CAS、规格、位置、负责人" oninput="homeSearch()"></div><div id="results"></div>`);
      homeSearch();
    }
    async function homeSearch(){
      const q=(document.getElementById("q")||{}).value||"";
      const results = document.getElementById("results");
      if(results) results.innerHTML = `<div class="panel"><div class="loading">正在加载...</div></div>`;
      const [consumables,hazardous,reagents,equipment]=await Promise.all([
        quietRun(client.from("consumables").select("*").or(`name.ilike.%${q}%,category.ilike.%${q}%,specification.ilike.%${q}%,location.ilike.%${q}%`).limit(50)).catch(()=>[]),
        quietRun(client.from("hazardous_reagents").select("*").or(`chinese_name.ilike.%${q}%,formula.ilike.%${q}%,cas.ilike.%${q}%`).limit(50)).catch(()=>[]),
        quietRun(client.from("reagents").select("*").or(`chinese_name.ilike.%${q}%,formula.ilike.%${q}%,cas.ilike.%${q}%`).limit(50)).catch(()=>[]),
        quietRun(client.from("equipment").select("*").or(`asset_no.ilike.%${q}%,name.ilike.%${q}%,model.ilike.%${q}%,owner.ilike.%${q}%,location.ilike.%${q}%`).limit(50)).catch(()=>[])
      ]);
      if(view !== "home") return;
      document.getElementById("results").innerHTML=`<div class="panel"><h2>耗材库存</h2>${table(consumables,["name:名称","category:分类","specification:规格","quantity:库存","unit:单位","location:位置"])}</div><br><div class="panel"><h2>危化品</h2>${table(hazardous,["chinese_name:中文名","formula:化学式","cas:CAS","quantity:数量","original_weight:原重","current_weight:现有重量"])}</div><br><div class="panel"><h2>普通化学试剂</h2>${table(reagents,["chinese_name:中文名","formula:化学式","cas:CAS","quantity:数量","original_weight:原重","current_weight:现有重量"])}</div><br><div class="panel"><h2>设备登记</h2>${table(equipment,["asset_no:资产编号","name:名称","model:型号","status:状态","owner:负责人","location:位置"])}</div>`;
    }
    function table(rows, fields, ops){
      return `<table><thead><tr>${fields.map(f=>`<th>${f.split(":")[1]}</th>`).join("")}${ops?`<th>操作</th>`:""}</tr></thead><tbody>${rows.map(r=>`<tr>${fields.map(f=>{const k=f.split(":")[0];return `<td class="${k==="quantity"&&Number(r.quantity)<=Number(r.min_quantity)?"low":""}">${h(r[k])}</td>`}).join("")}${ops?`<td class="actions">${ops(r)}</td>`:""}</tr>`).join("")}</tbody></table>`;
    }
    async function crud(tableName,title,fields,defaults){
      const expected = view;
      const cacheKey = `crud:${tableName}`;
      if(pageCache[cacheKey]){
        renderCrud(tableName,title,fields,defaults,pageCache[cacheKey]);
      }else{
        document.getElementById("root").innerHTML=layout(`<div class="panel"><div class="loading">正在加载${title}...</div></div>`);
      }
      const rows=await run(client.from(tableName).select("*").order("updated_at",{ascending:false}), {renderOnError:false}).catch(error=>{
        msg = errorText(error);
        return [];
      });
      if(view !== expected) return;
      pageCache[cacheKey]=rows;
      renderCrud(tableName,title,fields,defaults,rows);
    }
    function renderCrud(tableName,title,fields,defaults,rows){
      crudImportConfigs[tableName] = {fields, defaults};
      const form=canWrite()?`<form class="grid" onsubmit="saveCrud(event,'${tableName}')">${Object.entries(defaults).map(([k,v])=>`<label>${fields.find(f=>f.startsWith(k+":")).split(":")[1]}<input name="${k}" value="${h(v)}"></label>`).join("")}<button class="primary">新增${title}</button></form>`:"";
      const importer=canWrite()?`<div class="panel" style="margin-bottom:12px"><h2>Excel 批量导入</h2><p class="muted">第一行表头请使用：${fields.map(f=>f.split(":")[1]).join("、")}。支持 .xlsx、.xls、.csv。</p><input type="file" accept=".xlsx,.xls,.csv" onchange="importExcel('${tableName}', event)"><div id="import_status_${tableName}" class="msg" style="display:none"></div></div>`:"";
      document.getElementById("root").innerHTML=layout(`${importer}<div class="panel">${form}${table(rows,fields,r=>`${canWrite()?`<button onclick="fillEdit('${tableName}','${r.id}')">编辑</button>`:""}${isOwner()?`<button onclick="delItem('${tableName}','${r.id}')">删除</button>`:""}`)}</div>`);
    }
    async function saveCrud(e,tableName){e.preventDefault();const data=Object.fromEntries(new FormData(e.target));["quantity","min_quantity","price","original_weight","current_weight"].forEach(k=>{if(k in data)data[k]=Number(data[k]||0)});await run(client.from(tableName).insert(data));delete pageCache[`crud:${tableName}`];render()}
    async function importExcel(tableName,event){
      const file=event.target.files&&event.target.files[0];
      if(!file) return;
      const statusId=`import_status_${tableName}`;
      setInlineStatus(statusId,"正在读取 Excel...",false);
      if(!window.XLSX){setInlineStatus(statusId,"Excel 解析库加载失败，请刷新网页后重试。",true);return}
      const config = crudImportConfigs[tableName];
      if(!config){setInlineStatus(statusId,"当前页面还没有准备好，请刷新后重试。",true);return}
      const fields = config.fields;
      const fieldMap = Object.fromEntries(fields.flatMap(f=>{const [key,label]=f.split(":");return [[label,key],[key,key]]}));
      const validKeys = new Set(fields.map(f=>f.split(":")[0]));
      let rows = [];
      try{
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer,{type:"array"});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(sheet,{defval:""});
      }catch(error){
        setInlineStatus(statusId,"Excel 文件读取失败，请确认文件没有损坏。",true);
        return;
      }
      const parsed = rows.map(row=>{
        const item = {...config.defaults};
        let hasMatchedContent = false;
        Object.entries(row).forEach(([header,value])=>{
          const key = fieldMap[String(header).trim()];
          if(key){
            item[key] = value;
            if(String(value ?? "").trim() !== "") hasMatchedContent = true;
          }
        });
        ["quantity","min_quantity","price","original_weight","current_weight"].forEach(key=>{if(validKeys.has(key)) item[key]=Number(item[key]||0)});
        Object.keys(item).forEach(key=>{if(!validKeys.has(key)) delete item[key]});
        ["name","asset_no","chinese_name","formula","cas"].forEach(key=>{if(key in item)item[key]=String(item[key]||"").trim()});
        return hasMatchedContent ? item : null;
      }).filter(Boolean);
      const data = parsed.filter(item=>{
        if(tableName==="equipment") return item.asset_no && item.name;
        if(tableName==="consumables") return item.name;
        if(tableName==="hazardous_reagents" || tableName==="reagents") return item.chinese_name || item.formula || item.cas;
        return true;
      });
      if(!data.length){setInlineStatus(statusId,"没有识别到可导入的数据，请检查第一行表头。",true);return}
      const skipped = parsed.length - data.length;
      setInlineStatus(statusId,`已识别 ${data.length} 条${skipped ? `，跳过 ${skipped} 条不完整记录` : ""}，正在导入...`,false);
      const batchSize = 200;
      try{
        for(let i=0;i<data.length;i+=batchSize){
          const batch = data.slice(i,i+batchSize);
          const res = await retryTask(() => client.from(tableName).insert(batch), 3);
          if(res.error) throw res.error;
        }
      }catch(error){
        setInlineStatus(statusId,errorText(error),true);
        return;
      }
      delete pageCache[`crud:${tableName}`];
      msg = `已成功导入 ${data.length} 条记录`;
      render();
    }
    async function delItem(tableName,id){await run(client.from(tableName).delete().eq("id",id));delete pageCache[`crud:${tableName}`];render()}
    async function fillEdit(tableName,id){msg="当前在线版先支持新增和删除；需要修改请删除后重新新增。";render()}
    async function stock(mode){
      const expected = view;
      document.getElementById("root").innerHTML=layout(`<div class="panel"><div class="loading">正在加载耗材列表...</div></div>`);
      const items=await run(client.from("consumables").select("*").order("name")).catch(()=>[]);
      if(view !== expected) return;
      const disabled=!canWrite();
      const inboundNew = mode==="inbound" ? `<label><input type="checkbox" id="new_item_toggle" onchange="toggleNewItem()"> 新耗材首次入库</label><div id="new_item_fields" style="display:none"><div class="grid"><label>名称<input name="new_name"></label><label>分类<input name="new_category"></label><label>规格<input name="new_specification"></label><label>单位<input name="new_unit" value="件"></label><label>预警线<input name="new_min_quantity" type="number" value="0"></label><label>位置<input name="new_location"></label><label>供应商<input name="new_supplier"></label></div></div>` : "";
      document.getElementById("root").innerHTML=layout(`<div class="panel"><form class="stack" onsubmit="submitStock(event,'${mode}')"><label>耗材<select name="item_id" id="item_id" ${mode==="checkout"?"required":""}><option value="">请选择已有耗材</option>${items.map(i=>`<option value="${i.id}">${h(i.name)} · 当前 ${i.quantity}${h(i.unit)}</option>`).join("")}</select></label>${inboundNew}<label>数量<input name="quantity" type="number" min="0.01" step="0.01" value="1"></label><label>领用人/经办人<input name="borrower"></label><label>用途<input name="purpose"></label><label>备注<input name="remark"></label><button class="primary" ${disabled?"disabled":""}>${mode==="inbound"?"入库":"领用"}</button></form></div>`);
    }
    function toggleNewItem(){const checked=document.getElementById("new_item_toggle").checked;document.getElementById("new_item_fields").style.display=checked?"block":"none";document.getElementById("item_id").disabled=checked}
    async function submitStock(e,mode){
      e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.quantity=Number(d.quantity);let itemId=d.item_id;
      if(mode==="inbound"&&document.getElementById("new_item_toggle")&&document.getElementById("new_item_toggle").checked){
        const item=await run(client.from("consumables").insert({name:d.new_name,category:d.new_category||"",specification:d.new_specification||"",unit:d.new_unit||"件",quantity:0,min_quantity:Number(d.new_min_quantity||0),location:d.new_location||"",supplier:d.new_supplier||"",remark:d.remark||""}).select().single());
        itemId=item.id;
      }
      await run(client.from("stock_records").insert({item_type:"consumable",item_id:itemId,action:mode,quantity:d.quantity,operator_id:profile.id,borrower:d.borrower||"",purpose:d.purpose||"",remark:d.remark||""}));
      msg="操作成功";render();
    }
    async function records(){
      const expected = view;
      document.getElementById("root").innerHTML=layout(`<div class="panel"><div class="loading">正在加载历史记录...</div></div>`);
      const rows=await run(client.from("stock_records").select("*, profiles(full_name, username)").order("created_at",{ascending:false}).limit(300)).catch(()=>[]);
      if(view !== expected) return;
      document.getElementById("root").innerHTML=layout(`<div class="panel">${table(rows.map(r=>({...r,operator:r.profiles?(r.profiles.full_name||r.profiles.username):""})),["created_at:时间","action:动作","item_type:类型","quantity:数量","operator:操作人","borrower:领用人","purpose:用途","remark:备注"])}</div>`);
    }
    async function documents(){
      const categoryByView = {doc_instrument:"仪器操作说明", doc_method:"实验方法", doc_safety:"安全规范", doc_other:"其他"};
      documentCategory = categoryByView[view] || "仪器操作说明";
      const expected = view;
      const cacheKey = `documents:${documentCategory}`;
      if(pageCache[cacheKey]){
        renderDocuments(pageCache[cacheKey]);
      }else{
        document.getElementById("root").innerHTML=layout(`<div class="panel"><div class="loading">正在加载${h(documentCategory)}...</div></div>`);
      }
      const rows=await run(client.from("documents").select("*, profiles(full_name, username)").eq("category", documentCategory).order("updated_at",{ascending:false})).catch(()=>[]);
      if(view !== expected) return;
      pageCache[cacheKey]=rows;
      renderDocuments(rows);
    }
    function renderDocuments(rows){
      const form=canWrite()?`<form class="stack" onsubmit="saveDocument(event)"><div id="document_status" class="msg" style="display:none"></div><input type="hidden" name="category" value="${h(documentCategory)}"><div class="grid"><label>标题<input name="title" required></label><label>适用对象<input name="target" placeholder="例如 PCR 仪、凝胶电泳"></label><label>外部链接<input name="external_link" placeholder="PDF、视频或共享文档链接"></label></div><label>正文<textarea name="content" rows="8" style="resize:vertical;border:1px solid #cfd8dd;border-radius:6px;padding:10px;font:inherit"></textarea></label><button class="primary" data-label="新增${h(documentCategory)}">新增${h(documentCategory)}</button></form><br>`:"";
      const cards=rows.map(r=>`<div class="panel" style="margin-bottom:12px"><h2>${h(r.title)}</h2><p>${h(r.category)} · ${h(r.target || "通用")} · 更新于 ${new Date(r.updated_at).toLocaleString("zh-CN",{hour12:false})}</p><div style="white-space:pre-wrap;line-height:1.65">${h(r.content)}</div>${r.external_link?`<p style="margin-top:12px"><a href="${h(r.external_link)}" target="_blank" rel="noopener">打开外部链接</a></p>`:""}<p class="muted">发布人：${h(r.profiles ? (r.profiles.full_name || r.profiles.username) : "")}</p><div class="actions">${canWrite()&&(isOwner()||r.author_id===profile.id)?`<button onclick="editDocument('${r.id}')">编辑</button>`:""}${isOwner()?`<button onclick="deleteDocument('${r.id}')">删除</button>`:""}</div></div>`).join("");
      document.getElementById("root").innerHTML=layout(`<div>${form}${cards || `<div class="panel"><div class="loading">暂无${h(documentCategory)}。</div></div>`}</div>`);
    }
    async function saveDocument(e){
      e.preventDefault();
      const submitButton = e.target.querySelector("button");
      const buttonLabel = submitButton ? submitButton.dataset.label : "新增资料";
      if(submitButton){submitButton.disabled = true; submitButton.textContent = "正在保存...";}
      const data=Object.fromEntries(new FormData(e.target));
      data.title = (data.title || "").trim();
      data.content = data.content || "";
      if(!data.title){
        setInlineStatus("document_status","请填写资料标题",true);
        if(submitButton){submitButton.disabled = false; submitButton.textContent = buttonLabel;}
        return;
      }
      data.author_id=profile.id;
      setInlineStatus("document_status","正在保存，请稍候...",false);
      let error = null;
      try{
        const res = await retryTask(() => client.from("documents").insert(data));
        error = res.error;
      }catch(err){error = err}
      if(error){
        setInlineStatus("document_status",errorText(error),true);
        if(submitButton){submitButton.disabled = false; submitButton.textContent = buttonLabel;}
        return;
      }
      setInlineStatus("document_status","资料已新增",false);
      delete pageCache[`documents:${data.category}`];
      e.target.reset();
      setTimeout(render, 500);
    }
    async function editDocument(id){
      const row=await run(client.from("documents").select("*").eq("id",id).single());
      const content=prompt("修改正文内容：", row.content);
      if(content === null) return;
      const title=prompt("修改标题：", row.title);
      if(title === null) return;
      await run(client.from("documents").update({title, content}).eq("id",id));
      msg="资料已更新";
      Object.keys(pageCache).filter(k=>k.startsWith("documents:")).forEach(k=>delete pageCache[k]);
      render();
    }
    async function deleteDocument(id){
      if(!confirm("确定删除这条实验资料吗？")) return;
      await run(client.from("documents").delete().eq("id",id));
      msg="资料已删除";
      Object.keys(pageCache).filter(k=>k.startsWith("documents:")).forEach(k=>delete pageCache[k]);
      render();
    }
    async function users(){
      const expected = view;
      document.getElementById("root").innerHTML=layout(`<div class="panel"><div class="loading">正在加载用户列表...</div></div>`);
      const rows=await run(client.from("profiles").select("*").order("created_at",{ascending:false})).catch(()=>[]);
      if(view !== expected) return;
      document.getElementById("root").innerHTML=layout(`<div class="panel"><p class="muted">成员先用邮箱注册；负责人在这里调整角色和状态。</p>${table(rows,["username:邮箱","full_name:姓名","role:角色","is_active:启用","created_at:创建时间"],r=>`<select onchange="updateRole('${r.id}',this.value)"><option value="owner" ${r.role==="owner"?"selected":""}>负责人</option><option value="member" ${r.role==="member"?"selected":""}>成员</option><option value="readonly" ${r.role==="readonly"?"selected":""}>只读</option></select>`)}</div>`);
    }
    async function updateRole(id,role){await run(client.from("profiles").update({role}).eq("id",id));render()}
    async function exportExcel(){
      const [c,hz,re,e,r]=await Promise.all([
        quietRun(client.from("consumables").select("*")).catch(()=>[]),
        quietRun(client.from("hazardous_reagents").select("*")).catch(()=>[]),
        quietRun(client.from("reagents").select("*")).catch(()=>[]),
        quietRun(client.from("equipment").select("*")).catch(()=>[]),
        quietRun(client.from("stock_records").select("*")).catch(()=>[])
      ]);
      const csv = ["耗材库存", toCsv(c), "", "危化品", toCsv(hz), "", "普通化学试剂", toCsv(re), "", "设备登记", toCsv(e), "", "历史记录", toCsv(r)].join("\n");
      const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));a.download="实验室共享台账.csv";a.click();
    }
    function toCsv(rows){if(!rows.length)return "";const keys=Object.keys(rows[0]);return [keys.join(","),...rows.map(r=>keys.map(k=>`"${String(r[k]??"").replaceAll('"','""')}"`).join(","))].join("\n")}
    client.auth.onAuthStateChange((_event,nextSession)=>{session=nextSession;if(!session){profile=null;render()}});
    init();
  </script>
</body>
</html>
